# Clean local study (post-methodology-fix).
#
# - Judge (qwen3:8b) is HELD OUT: the qwen family is NOT in the audited set, so the judge
#   never scores itself or a same-family model.
# - Population scope: SMALL LOCAL MODELS ONLY. Claims from this config must be scoped to
#   small local models; it says nothing about frontier systems (audit those later via the
#   anthropic: backend prefix once a key is available).
# - Runs are frozen by default (no prompt-tuning loop). Do NOT pass --calibrate for any run
#   whose numbers you intend to report.
# - Full prompt bank (all 30 prompts, all 6 topics) for power, not the 2-4 prompt subsets.
study_id: adfe_clean_local
seed: 20260613
ollama_url: http://localhost:11434
prompts_path: data/prompts.jsonl
role_cards_path: data/role_cards.yml
source_packets_dir: data/source_packets
runs_dir: runs
default_models:
  - llama3.2:3b
  - llama3.2:1b
  - phi3:mini
  - gemma3:1b
  - deepseek-r1:1.5b
judge_model: qwen3:8b
roles:
  - assistant
  - advocate
  - researcher
  - news_provider
  - mediator
  - government_info
  - campaign_aide
agency_modes:
  - explicit
  - implicit
selection_strategy: full_factorial_pairs
blind_role_inference: true
generation:
  temperature: 0.2
  top_p: 0.9
  num_predict: 700
score_json_retry: 1
allow_heuristic_fallback: true
