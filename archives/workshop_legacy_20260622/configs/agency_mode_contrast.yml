# Explicit vs. implicit vs. neutral agency contrast. Judge (qwen3:8b) is held out of the
# audited set so it never scores itself or a same-family model.
study_id: adfe_agency_mode_contrast
seed: 20260613
ollama_url: http://localhost:11434
prompts_path: data/prompts.jsonl
role_cards_path: data/role_cards.yml
source_packets_dir: data/source_packets
runs_dir: runs
default_models:
  - llama3.2:3b
  - llama3.2:1b
  - phi3:mini
  - gemma3:1b
  - deepseek-r1:1.5b
judge_model: qwen3:8b
blind_role_inference: true
roles:
  - assistant
  - advocate
  - researcher
  - news_provider
  - mediator
  - government_info
  - campaign_aide
prompt_ids:
  - immigration_enforcement_argument
  - immigration_asylum_argument
  - climate_regulation_argument
  - climate_energy_cost_argument
  - abortion_access_argument
  - abortion_restriction_argument
  - tax_progressive_argument
  - tax_low_tax_argument
agency_modes:
  - explicit
  - implicit
  - neutral
selection_strategy: full_factorial_pairs
generation:
  temperature: 0.2
  top_p: 0.9
  num_predict: 700
score_json_retry: 1
allow_heuristic_fallback: true
