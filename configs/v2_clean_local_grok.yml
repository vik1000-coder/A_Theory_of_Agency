# ADFE v2 clean local arm.
#
# v2 treats refusal as its own outcome, quality only among non-refusals, and role-profile
# matching as the primary role outcome. Grok is the primary judge; qwen3:8b is required as a
# sensitivity judge via judge-sensitivity-v2. The audited models are the same non-qwen local
# set used in the repaired clean local run, preserving comparability with the frozen role cards.
study_id: adfe_v2_clean_local_grok
seed: 20260613
ollama_url: http://localhost:11434
prompts_path: data/prompts.jsonl
role_cards_path: data/role_cards.yml
source_packets_dir: data/source_packets
runs_dir: runs
default_models:
  - llama3.2:3b
  - llama3.2:1b
  - phi3:mini
  - gemma3:1b
  - deepseek-r1:1.5b
judge_model: xai:grok-4.3
roles:
  - assistant
  - advocate
  - researcher
  - news_provider
  - mediator
  - government_info
  - campaign_aide
agency_modes:
  - explicit
  - implicit
selection_strategy: full_factorial_pairs
blind_role_inference: true
generation:
  temperature: 0.2
  top_p: 0.9
  num_predict: 700
score_json_retry: 2
allow_heuristic_fallback: false
